name: Deploy to Hosting via SSH

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'DEPLOYMENT_GUIDE.md'
      - 'export_db*.php'
      - '*.zip'
      - 'e_rapot*.sql'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, zip, mysql, pdo_mysql, dom, curl, xml

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create .env file
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
        run: |
          cat > .env << 'EOF'
          APP_NAME="E-RAPOT"
          APP_ENV=production
          APP_KEY=$APP_KEY
          APP_DEBUG=false
          APP_URL=${{ vars.APP_URL }}

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          CACHE_STORE=file
          EOF

      - name: Run Laravel optimizations
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Install rsync & sshpass
        run: |
          apt-get update && apt-get install -y rsync sshpass

      - name: Deploy Files to Server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PASSPHRASE: ${{ secrets.DEPLOY_PASSPHRASE }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          # Setup SSH key with passphrase
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key
          cat << 'KEYEOF' > ~/.ssh/deploy_key
          ${{ secrets.DEPLOY_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Add host key to known_hosts
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Rsync files to server with passphrase
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='storage/*.key' \
            --exclude='*.log' \
            --exclude='.env.backup' \
            --exclude='bootstrap/cache/*.php' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            ./ $DEPLOY_HOST:$DEPLOY_PATH/

      - name: Run Post-Deploy Commands
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PASSPHRASE: ${{ secrets.DEPLOY_PASSPHRASE }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # SSH into server and run post-deploy commands
          sshpass -p "$DEPLOY_PASSPHRASE" ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $DEPLOY_HOST << 'ENDSSH'
            cd $DEPLOY_PATH

            # Install dependencies
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            # Set permissions
            chmod -R 775 storage bootstrap/cache
            chmod -R 777 storage/framework/cache storage/framework/views storage/framework/sessions storage/logs

            # Clear and rebuild caches
            php artisan config:cache --force
            php artisan route:cache --force
            php artisan view:cache --force
            php artisan event:cache --force

            echo "========================================"
            echo " Deployment Success!"
            echo "========================================"
          ENDSSH

      - name: Show Success
        if: success()
        run: |
          echo "========================================"
          echo " Deployment Successful!"
          echo " Site: ${{ vars.APP_URL }}"
          echo "========================================"

      - name: Show Failure
        if: failure()
        run: |
          echo "========================================"
          echo " Deployment Failed!"
          echo " Check GitHub Actions logs for details."
          echo "========================================"