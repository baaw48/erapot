name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEPLOY_STATUS: 0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE || '' }}
        timeout: 30m
        command_timeout: 20m
        debug: true
        script: |
          echo "=== Connecting to server ==="

          echo "=== Finding deployment directory ==="
          # Try multiple possible paths
          DEPLOY_DIR=""
          for dir in \
            "$HOME/public_html/erapot" \
            "$HOME/public_html/e-rapot" \
            "$HOME/public_html/baawmyid/erapot" \
            "$HOME/erapot" \
            "$HOME/e-rapot" \
            "/var/www/erapot" \
            "/var/www/html/erapot" \
            "/home/baawmyid/erapot" \
            "/home/baaw48/public_html/erapot" \
            "$HOME" \
            "$HOME/public_html" \
            "."
          do
            if [ -d "$dir" ] || [ -f "$dir/.env" ] || [ -f "$dir/artisan" ]; then
              DEPLOY_DIR="$dir"
              echo "Found directory: $DEPLOY_DIR"
              break
            fi
          done

          if [ -z "$DEPLOY_DIR" ]; then
            echo "WARNING: Could not auto-detect project directory"
            echo "Listing available directories:"
            ls -la ~/
            ls -la ~/public_html/ 2>/dev/null || echo "public_html not found"
            DEPLOY_DIR="."
          fi

          cd "$DEPLOY_DIR"
          pwd

          echo "=== Backup critical files ==="
          PROJECT_DIR=$(pwd)
          # Backup .env
          if [ -f .env ]; then
            cp .env /tmp/erapot_env_backup
            echo "Backed up .env"
          elif [ -f erapot/.env ]; then
            cp erapot/.env /tmp/erapot_env_backup
            echo "Backed up erapot/.env"
          fi
          # Backup logos folder (file upload/logo sekolah)
          if [ -d "public/logos" ]; then
            cp -r public/logos /tmp/erapot_logos_backup
            echo "Backed up logos folder"
          elif [ -d "erapot/public/logos" ]; then
            cp -r erapot/public/logos /tmp/erapot_logos_backup
            echo "Backed up erapot/public/logos"
          fi
          # Backup storage/app/public (file upload lainnya)
          if [ -d "storage/app/public" ]; then
            cp -r storage/app/public /tmp/erapot_storage_backup
            echo "Backed up storage/app/public"
          elif [ -d "erapot/storage/app/public" ]; then
            cp -r erapot/storage/app/public /tmp/erapot_storage_backup
            echo "Backed up erapot/storage/app/public"
          fi

          echo "=== Remove old folder ==="
          rm -rf erapot erapot.tar.gz erapot.zip 2>/dev/null || true
          mkdir -p erapot
          cd erapot
          pwd

          echo "=== Downloading repository archive ==="
          curl -L --max-time 300 -o erapot.zip "https://github.com/baaw48/erapot/archive/refs/heads/main.zip"
          ls -la erapot.zip

          echo "=== Extract files ==="
          unzip -o erapot.zip
          ls -la

          # Move all files from erapot-* subfolder
          if [ -d "erapot-main" ]; then
            cp -r erapot-main/* .
            cp -r erapot-main/.* . 2>/dev/null || true
            rm -rf erapot-main
          fi
          rm -f erapot.zip

          echo "=== Restore backed up files ==="
          # Restore .env
          if [ -f /tmp/erapot_env_backup ]; then
            cp /tmp/erapot_env_backup .env
            echo "Restored .env"
          fi
          # Restore logos folder
          if [ -d /tmp/erapot_logos_backup ]; then
            mkdir -p public/logos
            cp -r /tmp/erapot_logos_backup/* public/logos/ 2>/dev/null || true
            echo "Restored logos folder"
          fi
          # Restore storage/app/public
          if [ -d /tmp/erapot_storage_backup ]; then
            mkdir -p storage/app/public
            cp -r /tmp/erapot_storage_backup/* storage/app/public/ 2>/dev/null || true
            echo "Restored storage/app/public"
          fi

          echo "=== Verify logo exists ==="
          if [ -f "public/logos/"* ]; then
            echo "Logo file found: $(ls -la public/logos/)"
          else
            echo "WARNING: No logo file found in public/logos/"
          fi

          echo "=== Verify Welcome.vue ==="
          if [ -f "resources/js/Pages/Welcome.vue" ]; then
            echo "Welcome.vue found! Size: $(wc -c < resources/js/Pages/Welcome.vue) bytes"
            head -10 resources/js/Pages/Welcome.vue
          else
            echo "WARNING: Welcome.vue not found!"
          fi

          echo "=== Generate APP_KEY if needed ==="
          php artisan key:generate --force 2>/dev/null || echo "key:generate skipped (may already exist)"

          echo "=== Install composer dependencies ==="
          composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

          echo "=== Set permissions ==="
          chmod -R 775 storage bootstrap/cache 2>/dev/null || true
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true
          chmod -R 775 public/logos 2>/dev/null || true

          echo "=== Clear ALL caches (IMPORTANT) ==="
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          php artisan event:clear 2>/dev/null || true
          php artisan optimize:clear
          php artisan clear-compiled 2>/dev/null || true

          echo "=== Rebuild caches ==="
          php artisan config:cache
          php artisan view:cache 2>/dev/null || true
          php artisan route:cache 2>/dev/null || true

          echo "=== Final file check ==="
          echo "Logo files:"
          ls -la public/logos/ 2>/dev/null || echo "No logos folder"
          echo ""
          echo "Welcome.vue:"
          ls -la resources/js/Pages/Welcome.vue

          echo "=== Deploy completed successfully! ==="
          date