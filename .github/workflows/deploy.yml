name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        script: |
          set -e
          cd ~/public_html/baawmyid

          # Hapus folder lama dan clone ulang
          rm -rf erapot
          git clone https://github.com/baaw48/erapot.git erapot

          cd erapot

          # Install dependencies di hosting (PHP 8.4)
          composer install --no-dev --optimize-autoloader --prefer-dist --ignore-platform-reqs || composer update --no-dev --prefer-dist --ignore-platform-reqs

          # Build assets
          npm install
          npm run build

          # Copy .env jika belum ada
          if [ ! -f .env ]; then
            cp .env.example .env
            php artisan key:generate --force
          fi

          # Permissions
          chmod -R 775 storage bootstrap/cache
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true

          # Migrate & clear cache
          php artisan migrate --force || true
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan sync:riwayat-kelas || true

          echo "Deploy completed successfully!"