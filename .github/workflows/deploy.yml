name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: |
        npm run build
        echo "Build completed!"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        timeout: 30m
        command_timeout: 15m
        debug: true
        script: |
          set -e
          export DEPLOY_STATUS=0

          echo "=== Check basic server info ==="
          whoami
          pwd

          echo "=== Navigate to deployment directory ==="
          cd ~/public_html/baawmyid || { echo "Failed to cd to deployment dir"; exit 1; }
          pwd

          echo "=== Backup .env if exists ==="
          if [ -f erapot/.env ]; then
            cp erapot/.env /tmp/erapot_env_backup
            echo "Backed up existing .env"
          fi

          echo "=== Remove old folder ==="
          rm -rf erapot erapot.tar.gz 2>/dev/null || true
          mkdir -p erapot
          cd erapot
          echo "Downloading repository archive..."
          timeout 300 curl -L --max-time 300 -o erapot.zip https://github.com/baaw48/erapot/archive/refs/heads/main.zip 2>&1

          echo "Download complete, extracting..."
          unzip -q erapot.zip || { echo "Unzip failed"; exit 1; }

          # Move all files from erapot-* subfolder to current directory
          shopt -s dotglob nullglob
          mv erapot-*/* . 2>/dev/null || true
          rm -rf erapot-*
          rm erapot.zip

          echo "=== Check extracted files ==="
          ls -la
          ls -la resources/js/Pages/ | head -20

          echo "=== Restore .env file ==="
          if [ -f /tmp/erapot_env_backup ]; then
            cp /tmp/erapot_env_backup .env
            echo "Restored .env from backup!"
            rm /tmp/erapot_env_backup
          fi

          # Generate APP_KEY
          php artisan key:generate --force

          echo "=== Install composer dependencies ==="
          composer install --no-dev --optimize-autoloader --prefer-dist --ignore-platform-reqs 2>&1 || composer update --no-dev --prefer-dist --ignore-platform-reqs 2>&1

          echo "=== Set permissions ==="
          chmod -R 775 storage bootstrap/cache 2>/dev/null || true
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true

          echo "=== Clear ALL caches forcefully ==="
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          php artisan event:clear 2>/dev/null || true
          php artisan optimize:clear

          echo "=== Rebuild caches ==="
          php artisan config:cache
          php artisan route:cache 2>/dev/null || true
          php artisan view:cache

          echo "=== Verify Welcome.vue exists ==="
          cat resources/js/Pages/Welcome.vue | head -50

          echo "=== Deploy completed! ==="
          echo "Please visit https://baaw48.my.id/erapot to verify"