name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, zip, pdo, mysql

    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --prefer-dist

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        script: |
          set -e
          cd ~/public_html/baawmyid

          # Clone if not exists
          if [ ! -d "erapot" ]; then
            git clone https://github.com/baaw48/erapot.git erapot
          fi

          cd erapot
          git pull origin main || git clone https://github.com/baaw48/erapot.git . --force

          # Install & build
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build

          # Permissions
          chmod -R 775 storage bootstrap/cache
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true

          # Migrate & clear cache
          php artisan migrate --force || true
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan sync:riwayat-kelas || true

          echo "Deploy completed successfully!"