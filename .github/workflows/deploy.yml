name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEPLOY_STATUS: 0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE || '' }}
        timeout: 30m
        command_timeout: 20m
        debug: true
        script: |
          echo "=== STEP 1: Find Laravel project directory ==="

          # First, list home directory to see structure
          echo "Home directory contents:"
          ls -la ~/

          echo ""
          echo "Looking for Laravel project..."

          # Try to find existing Laravel project
          PROJECT_DIR=""
          for dir in \
            "$HOME/erapot.baaw48.my.id" \
            "$HOME/public_html/erapot.baaw48.my.id" \
            "$HOME/erapot" \
            "$HOME/public_html/erapot" \
            "$HOME/public_html/e-rapot" \
            "$HOME/public_html/baawmyid/erapot" \
            "$HOME/baawmyid/erapot"
          do
            if [ -d "$dir" ] && [ -f "$dir/artisan" ]; then
              PROJECT_DIR="$dir"
              echo "Found existing project at: $PROJECT_DIR"
              break
            fi
          done

          # If no existing project found, create one
          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR="$HOME/erapot"
            echo "No existing project found. Will create at: $PROJECT_DIR"
            mkdir -p "$PROJECT_DIR"
          fi

          cd "$PROJECT_DIR"
          echo "Working directory: $(pwd)"
          ls -la

          echo ""
          echo "=== STEP 2: Backup critical files ==="

          # Backup .env
          if [ -f ".env" ]; then
            cp .env /tmp/erapot_env_backup
            echo "Backed up .env"
          fi

          # Backup logos
          if [ -d "public/logos" ]; then
            cp -r public/logos /tmp/erapot_logos_backup
            echo "Backed up public/logos"
          fi

          # Backup storage
          if [ -d "storage/app/public" ]; then
            cp -r storage/app/public /tmp/erapot_storage_backup
            echo "Backed up storage/app/public"
          fi

          echo ""
          echo "=== STEP 3: Download new code from GitHub ==="

          cd ~
          rm -rf deploy_new deploy.zip 2>/dev/null
          mkdir -p deploy_new
          cd deploy_new

          curl -L --max-time 300 -o repo.zip "https://github.com/baaw48/erapot/archive/refs/heads/main.zip"
          unzip -o repo.zip

          echo "Extracted files:"
          ls -la

          # Copy to project directory (overwrite)
          echo ""
          echo "=== STEP 4: Deploy new code ==="

          # Go back to project dir
          cd "$PROJECT_DIR"

          # Remove old files except backups
          rm -rf app bootstrap config database public resources routes storage vendor artisan composer.* package.* 2>/dev/null || true

          # Copy new files
          if [ -d "~/deploy_new/erapot-main" ]; then
            cp -r ~/deploy_new/erapot-main/* .
            cp -r ~/deploy_new/erapot-main/.* . 2>/dev/null || true
          else
            cp -r ~/deploy_new/* . 2>/dev/null || true
            cp -r ~/deploy_new/.* . 2>/dev/null || true
          fi

          rm -rf ~/deploy_new

          echo "Project files after deploy:"
          ls -la

          echo ""
          echo "=== STEP 5: Restore backups ==="

          if [ -f /tmp/erapot_env_backup ]; then
            cp /tmp/erapot_env_backup .env
            echo "Restored .env"
          fi

          if [ -d /tmp/erapot_logos_backup ]; then
            mkdir -p public/logos
            cp -r /tmp/erapot_logos_backup/* public/logos/ 2>/dev/null || true
            echo "Restored logos"
          fi

          if [ -d /tmp/erapot_storage_backup ]; then
            mkdir -p storage/app/public
            cp -r /tmp/erapot_storage_backup/* storage/app/public/ 2>/dev/null || true
            echo "Restored storage"
          fi

          echo ""
          echo "=== STEP 6: Verify files ==="

          if [ -f "artisan" ]; then
            echo "✓ artisan found"
          else
            echo "✗ artisan NOT found"
          fi

          if [ -f "resources/js/Pages/Pembelajaran/Index.vue" ]; then
            echo "✓ Pembelajaran/Index.vue found"
          else
            echo "✗ Pembelajaran/Index.vue NOT found"
          fi

          echo ""
          echo "=== STEP 7: Install & Configure ==="

          # Install composer
          composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

          # Set permissions
          chmod -R 775 storage bootstrap/cache 2>/dev/null || true
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true

          # Clear caches
          php artisan config:clear 2>/dev/null || true
          php artisan cache:clear 2>/dev/null || true
          php artisan view:clear 2>/dev/null || true
          php artisan route:clear 2>/dev/null || true
          php artisan optimize:clear 2>/dev/null || true

          echo ""
          echo "=== DEPLOY COMPLETE ==="
          date
