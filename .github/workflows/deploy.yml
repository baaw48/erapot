name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        timeout: 30m
        command_timeout: 15m
        debug: true
        script: |
          set -e

          echo "=== Check basic server info ==="
          whoami
          pwd
          uname -a

          echo "=== Check if git is installed ==="
          which git || echo "GIT NOT FOUND"
          git --version || echo "GIT NOT AVAILABLE"

          echo "=== Check network connectivity ==="
          curl -s --max-time 10 https://api.github.com/zen || echo "Cannot reach GitHub API"
          ping -c 1 github.com || echo "Cannot ping github.com"

          echo "=== Navigate to deployment directory ==="
          cd ~/public_html/baawmyid
          pwd
          ls -la

          echo "=== Remove old folder and clone fresh ==="
          echo "Removing old folder..."
          rm -rf erapot erapot.tar.gz
          mkdir -p erapot
          cd erapot
          echo "Downloading repository archive..."
          timeout 300 curl -L --max-time 300 -o erapot.zip https://github.com/baaw48/erapot/archive/refs/heads/main.zip 2>&1
          CURL_EXIT=$?
          if [ $CURL_EXIT -eq 124 ]; then
            echo "Curl download timed out after 5 minutes!"
            exit 1
          elif [ $CURL_EXIT -ne 0 ]; then
            echo "Curl failed with exit code: $CURL_EXIT"
            exit 1
          fi
          echo "Download complete, extracting..."
          unzip -q erapot.zip
          # Move all files from erapot-* subfolder to current directory
          shopt -s dotglob nullglob
          mv erapot-*/* . 2>/dev/null || true
          rm -rf erapot-*
          rm erapot.zip
          echo "Extract successful!"
          ls -la

          echo "=== Create .env file if not exists ==="
          if [ ! -f .env ]; then
            cp .env.example .env
            php artisan key:generate --force
          fi

          echo "=== Update .env with production settings ==="
          sed -i 's/SESSION_DRIVER=database/SESSION_DRIVER=file/' .env || true
          sed -i 's/CACHE_STORE=database/CACHE_STORE=file/' .env || true

          echo "=== Install composer dependencies ==="
          composer install --no-dev --optimize-autoloader --prefer-dist --ignore-platform-reqs || composer update --no-dev --prefer-dist --ignore-platform-reqs

          echo "=== Build assets ==="
          npm install
          npm run build

          echo "=== Set permissions ==="
          chmod -R 775 storage bootstrap/cache || true
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true

          echo "=== Run migrations ==="
          php artisan migrate --force || true

          echo "=== Clear all caches ==="
          php artisan config:clear || true
          php artisan cache:clear || true
          php artisan view:clear || true
          php artisan route:clear || true
          php artisan sync:riwayat-kelas || true

          echo "=== Deploy completed successfully! ==="