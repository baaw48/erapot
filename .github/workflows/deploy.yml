name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd ~/public_html/baawmyid/erapot 2>/dev/null || mkdir -p ~/public_html/baawmyid/erapot
          if [ ! -d ~/public_html/baawmyid/erapot/.git ]; then
            git clone https://github.com/baaw48/erapot.git ~/public_html/baawmyid/erapot
          fi
          cd ~/public_html/baawmyid/erapot
          git pull origin main
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build
          php artisan sync:riwayat-kelas
          php artisan migrate --force
          php artisan config:clear
          php artisan cache:clear
          echo "Deploy selesai"
