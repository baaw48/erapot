name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Debug SSH Connection
      run: |
        echo "=== Debug SSH ==="
        echo "Host: ${{ secrets.SSH_HOST }}"
        echo "Username: ${{ secrets.SSH_USERNAME }}"
        echo "Port: ${{ secrets.SSH_PORT }}"
        echo "Key starts with: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | head -c 50)"
        echo "Key length: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | wc -c)"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        timeout: 15m
        command_timeout: 10m
        debug: true
        script: |
          set -e

          echo "=== SSH Connected Successfully ==="

          echo "=== Navigate to deployment directory ==="
          cd ~/public_html/baawmyid

          echo "=== Remove old folder and clone fresh ==="
          rm -rf erapot
          git clone https://github.com/baaw48/erapot.git erapot
          cd erapot

          echo "=== Create .env file if not exists ==="
          if [ ! -f .env ]; then
            cp .env.example .env
            php artisan key:generate --force
          fi

          echo "=== Update .env with production settings ==="
          sed -i 's/SESSION_DRIVER=database/SESSION_DRIVER=file/' .env || true
          sed -i 's/CACHE_STORE=database/CACHE_STORE=file/' .env || true

          echo "=== Install composer dependencies ==="
          composer install --no-dev --optimize-autoloader --prefer-dist --ignore-platform-reqs || composer update --no-dev --prefer-dist --ignore-platform-reqs

          echo "=== Build assets ==="
          npm install
          npm run build

          echo "=== Set permissions ==="
          chmod -R 775 storage bootstrap/cache || true
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true

          echo "=== Run migrations ==="
          php artisan migrate --force || true

          echo "=== Clear all caches ==="
          php artisan config:clear || true
          php artisan cache:clear || true
          php artisan view:clear || true
          php artisan route:clear || true
          php artisan sync:riwayat-kelas || true

          echo "=== Deploy completed successfully! ==="