name: Deploy to Hosting via SSH

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'DEPLOYMENT_GUIDE.md'
      - 'export_db*.php'
      - '*.zip'
      - 'e_rapot*.sql'
      - 'generate_ssh.*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, zip, mysql, pdo_mysql, dom, curl, xml

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy via SSH (Upload + Execute)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          command_timeout: 600
          script: |
            cd ${{ vars.DEPLOY_PATH }}

            #Upload files
            rsync -avz --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='node_modules' \
              --exclude='vendor' \
              --exclude='.env' \
              --exclude='storage' \
              --exclude='bootstrap/cache' \
              --exclude='*.log' \
              . ${{ vars.DEPLOY_PATH }}/

            #Create .env
            cat > .env << 'ENVEOF'
            APP_NAME="E-RAPOT"
            APP_ENV=production
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=false
            APP_URL=${{ vars.APP_URL }}

            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=file
            QUEUE_CONNECTION=sync
            CACHE_STORE=file
            ENVEOF

            #Install dependencies
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            #Set permissions
            chmod -R 775 storage bootstrap/cache
            chmod -R 777 storage/framework/cache storage/framework/views storage/framework/sessions storage/logs

            #Clear caches
            php artisan config:cache --force
            php artisan route:cache --force
            php artisan view:cache --force

            echo "========================================"
            echo " Deployment Success!"
            echo "========================================"

      - name: Show Success
        if: success()
        run: |
          echo "========================================"
          echo " Deployment Successful!"
          echo " Site: ${{ vars.APP_URL }}"
          echo "========================================"

      - name: Show Failure
        if: failure()
        run: |
          echo "========================================"
          echo " Deployment Failed!"
          echo " Check GitHub Actions logs for details."
          echo "========================================"