name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEPLOY_STATUS: 0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        passphrase: ${{ secrets.SSH_PASSPHRASE || '' }}
        timeout: 30m
        command_timeout: 20m
        debug: true
        script: |
          echo "=== Connecting to server ==="

          echo "=== Navigate to deployment directory ==="
          cd ~/public_html/baawmyid 2>/dev/null || { echo "Trying alternative path..."; cd /home/baaw48/public_html/baawmyid 2>/dev/null || { echo "Cannot find directory"; exit 1; } }
          pwd

          echo "=== Backup .env if exists ==="
          if [ -f erapot/.env ]; then
            cp erapot/.env /tmp/erapot_env_backup
            echo "Backed up existing .env"
          fi

          echo "=== Remove old folder ==="
          rm -rf erapot erapot.tar.gz erapot.zip 2>/dev/null || true
          mkdir -p erapot
          cd erapot
          pwd

          echo "=== Downloading repository archive ==="
          curl -L --max-time 300 -o erapot.zip "https://github.com/baaw48/erapot/archive/refs/heads/main.zip"
          ls -la erapot.zip

          echo "=== Extract files ==="
          unzip -o erapot.zip
          ls -la

          # Move all files from erapot-* subfolder
          if [ -d "erapot-main" ]; then
            cp -r erapot-main/* .
            cp -r erapot-main/.* . 2>/dev/null || true
            rm -rf erapot-main
          fi
          rm -f erapot.zip

          echo "=== Verify Welcome.vue ==="
          if [ -f "resources/js/Pages/Welcome.vue" ]; then
            echo "Welcome.vue found! Size: $(wc -c < resources/js/Pages/Welcome.vue) bytes"
            head -10 resources/js/Pages/Welcome.vue
          else
            echo "WARNING: Welcome.vue not found!"
          fi

          echo "=== Restore .env file ==="
          if [ -f /tmp/erapot_env_backup ]; then
            cp /tmp/erapot_env_backup .env
            echo "Restored .env from backup!"
          else
            echo "No backup found, creating new .env"
          fi

          echo "=== Generate APP_KEY ==="
          php artisan key:generate --force

          echo "=== Install composer dependencies ==="
          composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

          echo "=== Set permissions ==="
          chmod -R 775 storage bootstrap/cache 2>/dev/null || true
          chmod -R 777 storage/framework/views storage/framework/sessions storage/framework/cache storage/logs 2>/dev/null || true

          echo "=== Clear ALL caches ==="
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          php artisan optimize:clear 2>/dev/null || true

          echo "=== Rebuild caches ==="
          php artisan config:cache
          php artisan view:cache 2>/dev/null || true

          echo "=== Final file check ==="
          ls -la resources/js/Pages/Welcome.vue

          echo "=== Deploy completed successfully! ==="