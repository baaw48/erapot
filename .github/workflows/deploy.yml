name: Deploy to Domainesia

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        command_timeout: 600s
        script: |
          cd ~/public_html/baawmyid
          mkdir -p ~/public_html/baawmyid/erapot 2>/dev/null || true
          if [ ! -d "erapot/.git" ]; then
            rm -rf erapot
            git clone https://github.com/baaw48/erapot.git
          fi
          cd erapot
          git pull origin main
          chmod -R 755 storage bootstrap/cache
          chmod -R 777 storage/framework/cache storage/framework/views storage/framework/sessions storage/logs 2>/dev/null || true
